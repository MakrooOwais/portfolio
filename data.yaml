experience:
  description: "A progression through scale, research depth, and production responsibility."
  jobs:
    - company: "Amazon"
      title: "Amazon · Applied Scientist Intern (Core Search)"
      duration: "May 2025 - Nov 2025 · Bengaluru"
      points:
        - "Worked on improving ESCI ranking models and explored privacy risks in generative classifiers."
        - "Played with Amazon-scale data using Hadoop and Spark — large query logs, product catalogs, the whole thing."
        - "Showed that generative classifiers are much more vulnerable to membership inference attacks, exposing real utility-privacy trade-offs."
    - company: "IIT Kharagpur"
      title: "IIT Kharagpur · Research Intern"
      duration: "Dec 2023 - Apr 2025"
      points:
        - "Designed and built SALSA - a scalable, label-agnostic machine unlearning method."
        - "Made it 150x faster than prior work while getting significantly closer to oracle performance."
        - "Also designed a source-agnostic transfer learning framework for smarter layer selection."
    - company: "bhk.ai"
      title: "bhk.ai · ML Research Intern"
      duration: "May 2024 - Oct 2024 · Remote"
      points:
        - "Automated 3D real estate walkthrough generation with custom room-mapping models."
        - "Reduced a 7-8 hour manual 3D walkthrough setup process to under 60 seconds by building a fully automated room-mapping and connection pipeline."
        - "Designed a cross-attention architecture hitting 0.95 Dice score and 97% accuracy."
    - company: "IIT Jodhpur"
      title: "IIT Jodhpur · Research Intern"
      duration: "May 2024 - Jul 2024"
      points:
        - "Designed custom feature extraction pipelines tailored for medical imaging instead of relying on off-the-shelf backbones."
        - "Improved performance over existing benchmarks by 7-14% across multiple evaluation metrics."
        - "Ran extensive ablations to understand which architectural choices actually mattered in low-data clinical settings."

writing:
  description: "Explorations in representation learning, visualization, optimization, and the mechanics of modern neural networks."
  featured_count: 3
  articles:
    - title: "The Limits of Kindness: Understanding Goodness Through Dostoevsky's The Idiot"
      description: "A philosophical exploration of compassion without boundaries, examining Prince Myshkin as a study of whether pure kindness can survive within flawed social structures."
      url: "https://medium.com/@makroo.owais/are-good-people-idiots-1884bf2e32a9"
    - title: "Visualizing How Deep Learning Models Learn: Line Art Animation"
      description: "A visual study of how neural networks progressively refine representations, turning abstract gradients into structured understanding."
      url: "http://medium.com/@owaismakroo17/visualizing-how-deep-learning-models-learn-line-art-animation-1aa5f3cfb25b"
    - title: "Visualizing the Feature Space of a Classification Model: An In-depth Exploration Using MNIST and PCA"
      description: "Exploring how high-dimensional feature representations evolve in a classifier, using PCA to interpret structure in learned embeddings."
      url: "https://medium.com/@owaismakroo17/visualizing-the-feature-space-of-a-classification-model-an-in-depth-exploration-using-mnist-and-bb3b6a7287e9"
    - title: "Neural Style Transfer: Merging Art and AI to Create Masterpieces"
      description: "A deep dive into the mechanics of style transfer: from content/style loss decomposition to practical implementation details."
      url: "https://medium.com/@owaismakroo17/neural-style-transfer-merging-art-and-ai-to-create-masterpieces-9734a7e10a0c"
    - title: "TorchOptimizer: Efficient Hyperparameter Optimization for PyTorch Lightning Models"
      description: "Designing a scalable Bayesian optimization framework for PyTorch Lightning, balancing efficiency, modularity, and reproducibility."
      url: "https://medium.com/@makroo.owais/torchoptimizer-efficient-hyperparameter-optimization-for-pytorch-lightning-models-31ea4e7b7545"

projects:
  description: "Systems and tools designed to explore ideas deeply and make them usable."
  featured_count: 3
  project_list:
    - title: "SALSA Unlearning Library"
      description: "Unified framework for scalable machine unlearning with multiple baselines."
      url: "https://github.com/MakrooOwais/SALSA"
    - title: "SIREN - Explainable AI Framework"
      description: "Interpretability framework for detecting AI-generated images."
      url: "https://github.com/MakrooOwais/SIREN"
    - title: "LoRA for Vision Transformers"
      description: "Lightweight adaptation framework for Vision Transformers using LoRA"
      url: "https://github.com/MakrooOwais/LoRA-ViT-Pipeline"
    - title: "Transformer from Scratch (PyTorch Lightning)"
      description: "Full Transformer implementation from scratch with multi-head attention and sequence-to-sequence training for machine translation."
      url: "https://github.com/MakrooOwais/Transformer_Translator"
    - title: "Universal Function Estimation with Neural Networks"
      description: "Experimental study of the Universal Approximation Theorem using neural networks of varying depth and width."
      url: "https://github.com/MakrooOwais/Universal_Fn_Approx"
    - title: "Multi-Headed Deep Feature Learning for PPGL Genetic Cluster Classification"
      description: "Official implementation of the paper introducing a multi-headed, region-aware model for PPGL genetic subtype classification from CT scans."
      url: "https://github.com/MakrooOwais/CT_Region_Linear"
    - title: "TorchOptimizer"
      description: "Scalable Bayesian optimization framework for PyTorch models."
      url: "https://github.com/MakrooOwais/torchoptimizer"
    - title: "PyPopSim - Population Simulator"
      description: "Stochastic ecological simulator with predator-prey dynamics."
      url: "https://github.com/MakrooOwais/pypopsim"

